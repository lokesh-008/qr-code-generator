<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Dashboard</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
        .btn-download { background-color: #28a745; margin-top: 10px;}
        .btn-download:hover { background-color: #218838; }
        .qr-result {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        img { max-width: 250px; border: 1px solid #ddd; border-radius: 5px; padding: 5px; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>QR Code Generator</h2>
        <p>Enter a URL to create your QR code</p>
        
        <form method="POST">
            <input type="text" name="url" placeholder="https://example.com" required>
            <button type="submit" class="btn">Generate QR Code</button>
        </form>
        
        {% if qr_image %}
            <div class="qr-result">
                <img src="data:image/png;base64,{{ qr_image }}" alt="Generated QR Code">
                <br>
                <a href="data:image/png;base64,{{ qr_image }}" download="my_qrcode.png">
                    <button class="btn btn-download">Download PNG</button>
                </a>
            </div>
        {% endif %}
    </div>

</body>
</html>
